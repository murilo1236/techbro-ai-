<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TechBro AI</title>

<style>

body{
font-family: Arial;
background:black;
color:white;
text-align:center;
margin:0;
}

header{
background:#8b0000;
padding:20px;
}

.logo{
width:120px;
}

#chatbox{
width:420px;
margin:40px auto;
background:#111;
padding:25px;
border-radius:10px;
border:2px solid #8b0000;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
background:#8b0000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#resposta{
margin-top:20px;
background:#1a1a1a;
padding:15px;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>TechBro AI</h1>
<p>Assistente de PC Gamer</p>
</header>

<div id="chatbox">

<input id="pergunta" placeholder="Pergunte sobre PCs gamers...">
<button onclick="perguntar()">Enviar</button>

<div id="resposta">
Olá! Eu sou a TechBro AI 🤖
</div>

</div>

<script>

function perguntar(){

let pergunta = document.getElementById("pergunta").value.toLowerCase();
let resposta = "Não entendi a pergunta.";

if(pergunta.includes("pc barato")){
resposta = "PC barato: Ryzen 5 5600G + 16GB RAM.";
}

else if(pergunta.includes("rx 6600")){
resposta = "RX 6600 roda GTA V ~140 FPS.";
}

document.getElementById("resposta").innerHTML = resposta;

}

</script>

</body>
</html>
